name: circuit-breaker-plugin
on:
  push:
    branches: [main]
    paths:
      - 'kong/plugins/circuit-breaker/**'
      - '.github/workflows/circuit-breaker-plugin-release.yml'
  workflow_dispatch:
    inputs:
      Branch:
        description: 'Branch to Build'
        required: true
        default: 'main'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  helm_chart_name: 'circuit-breaker'
  helm_chart_dir: './kong/plugins/circuit-breaker/helm'
  helm_version: 'v3.16.3'

jobs:
  build-chart:
    runs-on: ubuntu-24.04
    name: Build and publish circuit-breaker kong plugin helm chart
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.Branch || github.ref }}
          fetch-depth: 0

      - name: Compute Semantic Version
        id: compute-version
        run: |
          TAG_PREFIX="circuit-breaker-"
          LATEST_TAG=$(git tag --list "${TAG_PREFIX}*" --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            NEW_VERSION="1.0.0"
          else
            VERSION="${LATEST_TAG#$TAG_PREFIX}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          fi
          BRANCH_NAME="${GITHUB_REF##*/}"
          RUN_NUMBER="${{ github.run_number }}"
          if [ "$BRANCH_NAME" = "main" ] || [ "$BRANCH_NAME" = "master" ]; then
            CLEAN_VERSION="$NEW_VERSION"
          else
            CLEAN_VERSION="${NEW_VERSION}-${BRANCH_NAME}-${RUN_NUMBER}"
          fi
          echo "VERSION=$CLEAN_VERSION" >> $GITHUB_OUTPUT
          echo "TAG_VERSION=${TAG_PREFIX}${CLEAN_VERSION}" >> $GITHUB_OUTPUT
          echo "Computed version: $CLEAN_VERSION"

      - name: Copy Lua Files to Helm Chart Directory
        run: |
          find ./kong/plugins/circuit-breaker -name '*.lua' -exec cp -prv '{}' "${{ env.helm_chart_dir }}" ";"
          echo "Copied lua source to helm directory"

      - name: Set Up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.helm_version }}

      - name: Helm Lint and Template
        run: |
          helm lint ${{ env.helm_chart_dir }}
          helm template ${{ env.helm_chart_dir }}
          echo "Helm lint and template successful"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Helm Package
        run: |
          helm package ${{ env.helm_chart_dir }} --version ${{ steps.compute-version.outputs.VERSION }}

      - name: Helm Push to GHCR
        run: |
          helm push ${{ env.helm_chart_name }}-${{ steps.compute-version.outputs.VERSION }}.tgz oci://ghcr.io/${{ github.repository_owner }}/helm-charts

      - name: Push Release Tag
        if: github.ref_name == 'main' || github.event.inputs.Branch == 'main' || github.event.inputs.Branch == 'master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.compute-version.outputs.TAG_VERSION }}" -m "Release ${{ steps.compute-version.outputs.TAG_VERSION }}"
          git push origin "${{ steps.compute-version.outputs.TAG_VERSION }}"

      - name: Create GitHub Release
        if: github.ref_name == 'main' || github.event.inputs.Branch == 'main' || github.event.inputs.Branch == 'master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.compute-version.outputs.TAG_VERSION }}
          name: "${{ env.helm_chart_name }} ${{ steps.compute-version.outputs.VERSION }}"
          generate_release_notes: true
          body: |
            ## Helm Chart: ${{ env.helm_chart_name }} v${{ steps.compute-version.outputs.VERSION }}

            ### Install
            ```bash
            helm install ${{ env.helm_chart_name }} oci://ghcr.io/${{ github.repository_owner }}/helm-charts/${{ env.helm_chart_name }} --version ${{ steps.compute-version.outputs.VERSION }} -n kong
            ```
          files: |
            ${{ env.helm_chart_name }}-${{ steps.compute-version.outputs.VERSION }}.tgz
